# 🏰 霍格沃茨百科 — GitHub Pages 自动部署工作流
# 触发条件：推送到 main、新闻更新完成后、每天定时构建

name: 🚀 Deploy to GitHub Pages

on:
  # 推送到 main 分支时自动部署
  push:
    branches: ['main']

  # 新闻更新 workflow 完成后自动重新部署（确保最新新闻上线）
  workflow_run:
    workflows: ['📰 Daily Prophet News Update']
    types: [completed]
    branches: ['main']

  # 每天 UTC 8:00（北京时间 16:00）定时构建部署
  schedule:
    - cron: '0 8 * * *'

  # 支持手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署，跳过排队中的任务（但不取消正在进行的）
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # ========== 构建阶段 ==========
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project
        run: npm run build

      - name: 📄 Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # ========== 部署阶段 ==========
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
